<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OperaDesk | Selecione seu perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="selector-page loading">

  <div class="selector-wrapper">
    <p class="selector-eyebrow">OperaDesk</p>
    <h1 class="selector-title">Como deseja acessar?</h1>
    <p class="selector-sub">Selecione seu perfil. A visão do sistema será ajustada de acordo com sua função.</p>

    <div class="role-grid">
      <div id="btnFuncionario" class="role-card">
        <div class="role-card-icon">👤</div>
        <h2>Sou Funcionário</h2>
        <p>Abra chamados de suporte e solicite equipamentos.</p>
      </div>
      <div id="btnTecnico" class="role-card">
        <div class="role-card-icon">🛠</div>
        <h2>Sou do Suporte Técnico</h2>
        <p>Gerencie chamados, ativos e acompanhe os indicadores operacionais.</p>
      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
