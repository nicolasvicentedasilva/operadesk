<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OperaDesk — Sistema de suporte técnico de TI">
  <title>OperaDesk | Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <section class="login-left">
      <div class="login-brand-panel">
        <div class="login-logo-box"><img src="img/logood.png" alt="OperaDesk"></div>
        <h1>OperaDesk</h1>
      </div>
    </section>

    <section class="login-right">
      <div class="login-form-shell">
        <h2 class="login-form-title">Acessar Sistema</h2>
        <form id="loginForm" class="login-form" autocomplete="off">
          <div id="loginError" class="login-error">Usuário ou senha incorretos.</div>
          <label class="form-group" for="loginUser">
            <span>Usuário</span>
            <input type="text" id="loginUser" placeholder="Seu usuário" required autocomplete="username">
          </label>
          <label class="form-group" for="loginPassword">
            <span>Senha</span>
            <input type="password" id="loginPassword" placeholder="Sua senha" required autocomplete="current-password">
          </label>
          <button type="submit" class="login-btn">Entrar</button>
        </form>
      </div>
    </section>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
